<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>窮鬼地圖 Broke Map — 慳錢食香港</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700;900&family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --red: #e8002d;
  --red-dark: #b5001e;
  --red-light: #fff0f3;
  --yellow: #f5c400;
  --yellow-light: #fffbe6;
  --dark: #1a0a0a;
  --dark2: #2d1515;
  --text: #1a0a0a;
  --text-muted: #8a6060;
  --text-soft: #5a3535;
  --surface: #ffffff;
  --surface2: #fdf5f5;
  --surface3: #f5e8e8;
  --border: #f0d8d8;
  --shadow: 0 2px 16px rgba(232,0,45,0.10);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans HK', 'Noto Sans KR', sans-serif;
  background: var(--dark);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.app-header {
  background: var(--red);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 1000;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.logo-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.logo-icon {
  width: 36px; height: 36px;
  background: var(--yellow);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text {
  display: flex; flex-direction: column;
}
.logo-main {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 1px;
  line-height: 1;
}
.logo-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.75);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 1px;
}
.header-btns { display: flex; gap: 8px; align-items: center; }
.header-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans HK', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.header-btn:hover { background: rgba(255,255,255,0.25); }
.header-btn.primary {
  background: var(--yellow);
  border-color: var(--yellow);
  color: var(--dark);
}
.header-btn.primary:hover { background: #e6b800; }

/* ===== LANG TOGGLE ===== */
.lang-toggle {
  display: flex;
  background: rgba(0,0,0,0.2);
  border-radius: 20px;
  padding: 2px;
}
.lang-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 16px;
  cursor: pointer;
  font-family: 'Noto Sans HK', sans-serif;
  transition: all 0.15s;
}
.lang-btn.active { background: #fff; color: var(--red); }

/* ===== FILTER BAR ===== */
.filter-bar {
  background: var(--dark2);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-label {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}
.fchip {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  color: rgba(255,255,255,0.6);
  flex-shrink: 0;
  font-family: 'Noto Sans HK', sans-serif;
}
.fchip.active {
  background: var(--yellow);
  border-color: var(--yellow);
  color: var(--dark);
}
.fchip:hover:not(.active) { border-color: var(--yellow); color: var(--yellow); }
.filter-sep {
  width: 1px; height: 20px;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* ===== MAIN LAYOUT ===== */
.main-layout {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ===== MAP ===== */
#map {
  flex: 1;
  z-index: 1;
}

/* Leaflet 커스텀 마커 */
.custom-marker {
  background: var(--red);
  border: 2px solid #fff;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
}
.custom-marker.cheap { background: #16a34a; }
.custom-marker.mid { background: var(--red); }
.custom-marker.pricey { background: #9333ea; }
.marker-icon {
  transform: rotate(45deg);
  font-size: 12px;
  color: #fff;
  font-weight: 900;
  font-family: 'Oswald', sans-serif;
  line-height: 1;
}

/* ===== SIDE PANEL ===== */
.side-panel {
  width: 340px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-left: none;
  box-shadow: -4px 0 24px rgba(0,0,0,0.15);
  z-index: 2;
  transition: transform 0.3s ease;
}
@media (max-width: 768px) {
  .side-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    width: 100%;
    height: 50vh;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
    transform: translateY(0);
  }
  .side-panel.collapsed { transform: translateY(calc(100% - 60px)); }
}

.panel-header {
  background: var(--surface2);
  padding: 14px 16px 10px;
  border-bottom: 1.5px solid var(--border);
  flex-shrink: 0;
}
.panel-title {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.panel-count {
  font-size: 11px;
  color: var(--text-muted);
}
.panel-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.panel-list::-webkit-scrollbar { width: 4px; }
.panel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ===== PLACE CARD ===== */
.place-card {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  gap: 12px;
}
.place-card:hover { background: var(--red-light); }
.place-card.active { background: var(--red-light); border-left: 3px solid var(--red); }

.card-price-badge {
  background: var(--red);
  color: #fff;
  border-radius: 10px;
  padding: 4px 8px;
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 2px;
}
.card-price-badge.cheap { background: #16a34a; }
.card-price-badge.pricey { background: #9333ea; }

.card-info { flex: 1; min-width: 0; }
.card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-name-en {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.card-district {
  display: inline-block;
  background: var(--surface3);
  color: var(--text-soft);
  border-radius: 6px;
  padding: 2px 7px;
  font-size: 10px;
  font-weight: 700;
  margin-bottom: 4px;
}
.card-dish {
  font-size: 12px;
  color: var(--text-soft);
  margin-bottom: 4px;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.ctag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 6px;
  background: var(--surface3);
  color: var(--text-soft);
  font-weight: 500;
}

/* ===== DETAIL PANEL ===== */
.detail-panel {
  position: absolute;
  top: 0; right: 0;
  width: 380px;
  height: 100%;
  background: var(--surface);
  z-index: 10;
  overflow-y: auto;
  box-shadow: -4px 0 32px rgba(0,0,0,0.2);
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.detail-panel.open { transform: translateX(0); }

@media (max-width: 768px) {
  .detail-panel {
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 85vh;
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
  }
  .detail-panel.open { transform: translateY(0); }
}

.detail-hero {
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  padding: 20px;
  position: relative;
}
.detail-close {
  position: absolute;
  top: 14px; right: 14px;
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  width: 30px; height: 30px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.detail-close:hover { background: rgba(255,255,255,0.35); }
.detail-category-badge {
  display: inline-block;
  background: var(--yellow);
  color: var(--dark);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 10px;
}
.detail-name {
  font-size: 24px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 2px;
  line-height: 1.2;
}
.detail-name-en {
  font-size: 14px;
  color: rgba(255,255,255,0.75);
  margin-bottom: 12px;
}
.detail-price-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.detail-price {
  font-family: 'Oswald', sans-serif;
  font-size: 28px;
  font-weight: 900;
  color: var(--yellow);
}
.detail-price-label {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
}

.detail-body { padding: 20px; }
.detail-section { margin-bottom: 18px; }
.detail-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.detail-info-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text);
}
.detail-info-row:last-child { border-bottom: none; }
.detail-info-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }

.payment-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.payment-chip {
  background: var(--surface3);
  color: var(--text-soft);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
}
.payment-chip.available { background: #dcfce7; color: #166534; }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.detail-tag {
  background: var(--red-light);
  color: var(--red);
  border: 1px solid #ffc0cb;
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
}

.detail-verified {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #dcfce7;
  color: #166534;
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 16px;
}

.map-link-btn {
  width: 100%;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans HK', sans-serif;
  transition: all 0.15s;
  margin-bottom: 10px;
}
.map-link-btn:hover { background: var(--red-dark); }

/* ===== REPORT FORM ===== */
.report-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.report-overlay.active { display: flex; }
.report-sheet {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
}
.report-title {
  font-family: 'Oswald', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--red);
  margin-bottom: 4px;
}
.report-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
.form-row { margin-bottom: 14px; }
.form-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}
.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  font-size: 14px;
  font-family: 'Noto Sans HK', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--red); background: #fff; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

.payment-select { display: flex; flex-wrap: wrap; gap: 6px; }
.pcheck {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-muted);
  font-family: 'Noto Sans HK', sans-serif;
}
.pcheck.sel { background: #dcfce7; border-color: #16a34a; color: #166534; }

.submit-btn {
  width: 100%;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 15px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans HK', sans-serif;
  transition: all 0.15s;
  margin-top: 8px;
}
.submit-btn:hover { background: var(--red-dark); }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--dark);
  color: #fff;
  padding: 12px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== EMPTY STATE ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 13px; font-weight: 600; color: var(--text-soft); }
.empty-sub { font-size: 11px; margin-top: 4px; }

/* ===== LOADING ===== */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--dark);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-logo {
  font-family: 'Oswald', sans-serif;
  font-size: 36px;
  font-weight: 900;
  color: var(--yellow);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.loading-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.loading-bar-wrap {
  width: 200px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}
.loading-bar {
  height: 100%;
  background: var(--red);
  border-radius: 3px;
  animation: loadBar 1.5s ease-in-out infinite;
}
@keyframes loadBar {
  0% { width: 0%; margin-left: 0; }
  50% { width: 70%; margin-left: 0; }
  100% { width: 0%; margin-left: 100%; }
}

/* ===== MOBILE PANEL HANDLE ===== */
.panel-handle {
  display: none;
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 8px auto 0;
}
@media (max-width: 768px) {
  .panel-handle { display: block; }
  .detail-panel { scrollbar-width: none; }
  .detail-panel::-webkit-scrollbar { display: none; }
}

/* ===== MAP CONTROLS ===== */
.map-controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
@media (max-width: 768px) {
  .map-controls { bottom: 55vh; right: 12px; }
}
.map-ctrl-btn {
  width: 42px; height: 42px;
  background: #fff;
  border: none;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.map-ctrl-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
.map-ctrl-btn.locate { background: var(--red); color: #fff; }

/* ===== STATS BAR ===== */
.stats-bar {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(26,10,10,0.85);
  backdrop-filter: blur(8px);
  border-radius: 30px;
  padding: 6px 16px;
  display: flex;
  gap: 16px;
  align-items: center;
  border: 1px solid rgba(255,255,255,0.1);
}
.stat-item { display: flex; align-items: center; gap: 5px; }
.stat-num {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--yellow);
}
.stat-label { font-size: 10px; color: rgba(255,255,255,0.5); }
.stat-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.15); }

/* Leaflet popup 커스텀 */
.leaflet-popup-content-wrapper {
  background: var(--dark);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.leaflet-popup-tip { background: var(--dark); }
.leaflet-popup-content { margin: 12px 16px; }
.popup-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.popup-price { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: var(--yellow); }
.popup-district { font-size: 11px; color: rgba(255,255,255,0.5); }
.popup-btn {
  display: block;
  width: 100%;
  margin-top: 8px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans HK', sans-serif;
  text-align: center;
}
</style>
</head>
<body>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">窮鬼地圖</div>
  <div class="loading-sub">BROKE MAP · HONG KONG</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<!-- 헤더 -->
<div class="app-header">
  <div class="logo-wrap" onclick="resetView()">
    <div class="logo-icon">💰</div>
    <div class="logo-text">
      <div class="logo-main">窮鬼地圖</div>
      <div class="logo-sub">BROKE MAP · HK</div>
    </div>
  </div>
  <div class="header-btns">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('zh')" id="lang-zh">中</button>
      <button class="lang-btn" onclick="setLang('en')" id="lang-en">EN</button>
      <button class="lang-btn" onclick="setLang('ko')" id="lang-ko">한</button>
    </div>

<script>
// ===== CONFIG =====
// TODO: 새 Supabase 프로젝트 연결 후 아래 값을 교체하세요
const SUPABASE_URL = 'https://nsxhzxlvtgwneiafmfmy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MP-BjPpUp0djwP4ktmKk9A_IzuvnWZK';

let db;
let map;
let markers = [];
let allPlaces = [];
let filteredPlaces = [];
let currentLang = 'zh';
let priceFilter = 'all';
let categoryFilter = null;
let activeMarkerId = null;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
  initMap();
  db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  await loadPlaces();
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }, 1500);
});

// ===== MAP INIT =====
function initMap() {
  map = L.map('map', {
    center: [22.3193, 114.1694],
    zoom: 13,
    zoomControl: false,
    attributionControl: true
  });

  // OpenStreetMap 타일 (무료)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(map);
}

// ===== LOAD DATA =====
async function loadPlaces() {
  try {
    const { data, error } = await db.from('brokemap_places').select('*').eq('is_verified', true);
    if (error) throw error;
    allPlaces = data || [];
    renderPlaces();
  } catch(e) {
    loadDemoData();
  }
}

function loadDemoData() {
  allPlaces = [
    { id: '1', name_zh: '澳洲牛奶公司', name_en: 'Australia Dairy Company', district_en: 'Jordan', district_zh: '佐敦', lat: 22.3048, lng: 114.1703, category: 'cha_chaan_teng', price_min: 25, price_max: 60, signature_dish: '炒蛋多士', payment: ['cash'], tags: ['혼밥 좋음', '빨리 나옴', '현금만'], open_hours: '07:30-23:00', is_verified: true },
    { id: '2', name_zh: '沾仔記', name_en: 'Tsim Chai Kee', district_en: 'Central', district_zh: '中環', lat: 22.2817, lng: 114.1541, category: 'noodle', price_min: 35, price_max: 55, signature_dish: '雲吞麵', payment: ['cash', 'octopus'], tags: ['혼밥 좋음', '빨리 나옴'], open_hours: '09:00-21:00', is_verified: true },
    { id: '3', name_zh: '公和荳品廠', name_en: 'Kung Wo Bean Curd', district_en: 'Sham Shui Po', district_zh: '深水埗', lat: 22.3306, lng: 114.1624, category: 'dessert', price_min: 10, price_max: 25, signature_dish: '豆腐花', payment: ['cash', 'octopus'], tags: ['저렴', '혼밥 좋음'], open_hours: '07:00-20:30', is_verified: true },
    { id: '4', name_zh: '勝香園', name_en: 'Sing Heung Yuen', district_en: 'Central', district_zh: '中環', lat: 22.2833, lng: 114.1548, category: 'cha_chaan_teng', price_min: 30, price_max: 55, signature_dish: '番茄通粉', payment: ['cash'], tags: ['야외', '혼밥 좋음', '현금만'], open_hours: '07:30-18:00', is_verified: true },
    { id: '5', name_zh: '麥文記麵家', name_en: 'Mak Man Kee', district_en: 'Jordan', district_zh: '佐敦', lat: 22.3050, lng: 114.1705, category: 'noodle', price_min: 40, price_max: 65, signature_dish: '鮮蝦雲吞麵', payment: ['cash'], tags: ['혼밥 좋음', '현금만'], open_hours: '12:00-01:00', is_verified: true },
    { id: '6', name_zh: '泰昌餅家', name_en: 'Tai Cheong Bakery', district_en: 'Central', district_zh: '中環', lat: 22.2829, lng: 114.1540, category: 'bakery', price_min: 8, price_max: 20, signature_dish: '蛋撻', payment: ['cash', 'octopus', 'visa'], tags: ['테이크아웃', '저렴'], open_hours: '07:30-21:00', is_verified: true },
    { id: '7', name_zh: '坤記煲仔小菜', name_en: 'Kwan Kee Clay Pot', district_en: 'Sheung Wan', district_zh: '上環', lat: 22.2869, lng: 114.1456, category: 'rice', price_min: 55, price_max: 90, signature_dish: '煲仔飯', payment: ['cash', 'octopus'], tags: ['저녁만', '웨이팅 있음'], open_hours: '18:00-23:00', is_verified: true },
    { id: '8', name_zh: '九記牛腩', name_en: 'Kau Kee', district_en: 'Sheung Wan', district_zh: '上環', lat: 22.2852, lng: 114.1527, category: 'noodle', price_min: 45, price_max: 80, signature_dish: '牛腩麵', payment: ['cash'], tags: ['웨이팅 있음', '현금만', '양 많음'], open_hours: '12:30-22:30', is_verified: true },
    { id: '9', name_zh: '興記', name_en: 'Hing Kee', district_en: 'Mong Kok', district_zh: '旺角', lat: 22.3196, lng: 114.1697, category: 'cha_chaan_teng', price_min: 25, price_max: 50, signature_dish: '奶茶', payment: ['cash', 'octopus'], tags: ['저렴', '빨리 나옴'], open_hours: '07:00-22:00', is_verified: true },
    { id: '10', name_zh: '沙爹王', name_en: 'Satay King', district_en: 'Mong Kok', district_zh: '旺角', lat: 22.3175, lng: 114.1693, category: 'hot_pot', price_min: 50, price_max: 80, signature_dish: '沙爹牛肉麵', payment: ['cash', 'octopus'], tags: ['심야 가능', '혼밥 좋음'], open_hours: '12:00-03:00', is_verified: true },
  ];
  renderPlaces();
}

// ===== RENDER =====
function renderPlaces() {
  // 필터 적용
  filteredPlaces = allPlaces.filter(p => {
    if (priceFilter !== 'all' && p.price_min > priceFilter) return false;
    if (categoryFilter && p.category !== categoryFilter) return false;
    return true;
  });

  updateStats();
  renderMarkers();
  renderList();
}

function updateStats() {
  document.getElementById('statTotal').textContent = filteredPlaces.length;
  if (filteredPlaces.length > 0) {
    const avg = Math.round(filteredPlaces.reduce((s, p) => s + (p.price_min || 0), 0) / filteredPlaces.length);
    document.getElementById('statAvgPrice').textContent = `$${avg}`;
    document.getElementById('statUnder50').textContent = filteredPlaces.filter(p => p.price_min <= 50).length;
  } else {
    document.getElementById('statAvgPrice').textContent = '-';
    document.getElementById('statUnder50').textContent = '0';
  }

  const count = filteredPlaces.length;
  const langs = {
    zh: `共 ${count} 間食肆`,
    en: `${count} places found`,
    ko: `${count}개 식당`
  };
  document.getElementById('panelCount').textContent = langs[currentLang] || langs.zh;
}

function getPriceClass(price) {
  if (price <= 30) return 'cheap';
  if (price <= 70) return 'mid';
  return 'pricey';
}

function renderMarkers() {
  // 기존 마커 제거
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  filteredPlaces.forEach(place => {
    const cls = getPriceClass(place.price_min);
    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker ${cls}" style="width:34px;height:34px;display:flex;align-items:center;justify-content:center;"><span class="marker-icon">$${place.price_min}</span></div>`,
      iconSize: [34, 34],
      iconAnchor: [17, 34],
      popupAnchor: [0, -36]
    });

    const marker = L.marker([place.lat, place.lng], { icon })
      .addTo(map)
      .bindPopup(`
        <div class="popup-name">${place.name_zh}</div>
        <div class="popup-district">${place.district_en} · ${place.district_zh || ''}</div>
        <div class="popup-price">HKD $${place.price_min}${place.price_max ? '–'+place.price_max : '+'}</div>
        <button class="popup-btn" onclick="openDetail('${place.id}')">
          ${currentLang === 'en' ? 'View Details' : currentLang === 'ko' ? '상세보기' : '查看詳情'} →
        </button>
      `, { maxWidth: 200 });

    marker._placeId = place.id;
    markers.push(marker);
  });
}

function renderList() {
  const list = document.getElementById('placeList');
  if (filteredPlaces.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">${currentLang === 'en' ? 'No places found' : currentLang === 'ko' ? '해당하는 식당 없음' : '冇符合結果'}</div>
      <div class="empty-sub">${currentLang === 'en' ? 'Try a different filter' : currentLang === 'ko' ? '필터를 바꿔보세요' : '試試其他篩選'}</div>
    </div>`;
    return;
  }

  list.innerHTML = filteredPlaces.map(p => {
    const cls = getPriceClass(p.price_min);
    const tags = (p.tags || []).slice(0, 3).map(t => `<span class="ctag">${t}</span>`).join('');
    return `
      <div class="place-card ${activeMarkerId === p.id ? 'active' : ''}" onclick="openDetail('${p.id}')" id="card-${p.id}">
        <div class="card-price-badge ${cls}">$${p.price_min}${p.price_max ? '–'+p.price_max : '+'}</div>
        <div class="card-info">
          <div class="card-name">${p.name_zh}</div>
          <div class="card-name-en">${p.name_en || ''}</div>
          <div class="card-district">${p.district_en} ${p.district_zh ? '· '+p.district_zh : ''}</div>
          ${p.signature_dish ? `<div class="card-dish">🍽 ${p.signature_dish}</div>` : ''}
          <div class="card-tags">${tags}</div>
        </div>
      </div>`;
  }).join('');
}

// ===== DETAIL =====
function openDetail(id) {
  const place = allPlaces.find(p => p.id === id);
  if (!place) return;

  activeMarkerId = id;

  const paymentMap = {
    cash: 'Cash 現金', octopus: 'Octopus 八達通',
    alipay_hk: 'AlipayHK', wechat_pay: 'WeChat Pay HK',
    visa: 'Visa/Master', fps: 'FPS 轉數快'
  };
  const categoryMap = {
    cha_chaan_teng: '茶餐廳', noodle: '麵食', rice: '飯類',
    bakery: '烘焙', dessert: '甜品', hot_pot: '火鍋', other: '其他'
  };

  const payments = (place.payment || []).map(p =>
    `<span class="payment-chip available">${paymentMap[p] || p}</span>`
  ).join('');

  const tags = (place.tags || []).map(t =>
    `<span class="detail-tag">${t}</span>`
  ).join('');

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-hero">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-category-badge">${categoryMap[place.category] || place.category}</div>
      <div class="detail-name">${place.name_zh}</div>
      <div class="detail-name-en">${place.name_en || ''}</div>
      <div class="detail-price-row">
        <div class="detail-price">HKD $${place.price_min}${place.price_max ? '–'+place.price_max : '+'}</div>
        <div class="detail-price-label">${currentLang === 'en' ? 'per person' : currentLang === 'ko' ? '1인당' : '每位'}</div>
      </div>
    </div>
    <div class="detail-body">
      ${place.is_verified ? `<div class="detail-verified">✅ ${currentLang === 'en' ? 'Verified by community' : currentLang === 'ko' ? '커뮤니티 검증 완료' : '已驗證'}</div>` : ''}

      <div class="detail-section">
        <div class="detail-section-title">${currentLang === 'en' ? 'INFO' : currentLang === 'ko' ? '정보' : '資料'}</div>
        <div class="detail-info-row"><span class="detail-info-icon">📍</span><span>${place.district_en}${place.district_zh ? ' · '+place.district_zh : ''}${place.address ? '<br><small style="color:var(--text-muted)">' + place.address + '</small>' : ''}</span></div>
        ${place.signature_dish ? `<div class="detail-info-row"><span class="detail-info-icon">🍽</span><span>${place.signature_dish}</span></div>` : ''}
        ${place.open_hours ? `<div class="detail-info-row"><span class="detail-info-icon">🕐</span><span>${place.open_hours}</span></div>` : ''}
        ${place.is_solo_friendly ? `<div class="detail-info-row"><span class="detail-info-icon">👤</span><span>${currentLang === 'en' ? 'Solo friendly' : currentLang === 'ko' ? '혼밥 가능' : '可以一個人食'}</span></div>` : ''}
      </div>

      ${payments ? `<div class="detail-section">
        <div class="detail-section-title">${currentLang === 'en' ? 'PAYMENT' : currentLang === 'ko' ? '결제수단' : '付款方式'}</div>
        <div class="payment-chips">${payments}</div>
      </div>` : ''}

      ${tags ? `<div class="detail-section">
        <div class="detail-section-title">${currentLang === 'en' ? 'TAGS' : currentLang === 'ko' ? '태그' : '標籤'}</div>
        <div class="tags-wrap">${tags}</div>
      </div>` : ''}

      <button class="map-link-btn" onclick="flyToPlace('${place.id}')">
        🗺 ${currentLang === 'en' ? 'Show on Map' : currentLang === 'ko' ? '지도에서 보기' : '喺地圖查看'}
      </button>
      <button class="map-link-btn" style="background:var(--surface2);color:var(--text);" onclick="openGoogleMaps(${place.lat}, ${place.lng}, '${encodeURIComponent(place.name_zh)}')">
        🔗 ${currentLang === 'en' ? 'Open in Google Maps' : currentLang === 'ko' ? '구글 지도에서 열기' : '喺Google Maps開啟'}
      </button>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');

  // 해당 카드 스크롤
  const card = document.getElementById(`card-${id}`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  renderList();
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  activeMarkerId = null;
  renderList();
}

function flyToPlace(id) {
  const place = allPlaces.find(p => p.id === id);
  if (!place) return;
  map.flyTo([place.lat, place.lng], 17, { duration: 0.8 });
  const marker = markers.find(m => m._placeId === id);
  if (marker) marker.openPopup();
  closeDetail();
}

function openGoogleMaps(lat, lng, name) {
  window.open(`https://www.google.com/maps/search/${name}/@${lat},${lng},17z`, '_blank');
}

// ===== FILTERS =====
function setPrice(el, val) {
  document.querySelectorAll('.filter-bar .fchip').forEach((c, i) => {
    if (i < 5) c.classList.remove('active');
  });
  el.classList.add('active');
  priceFilter = val;
  renderPlaces();
}

function setCategory(el, val) {
  if (el.classList.contains('active')) {
    el.classList.remove('active');
    categoryFilter = null;
  } else {
    document.querySelectorAll('.filter-bar .fchip').forEach((c, i) => {
      if (i >= 5) c.classList.remove('active');
    });
    el.classList.add('active');
    categoryFilter = val;
  }
  renderPlaces();
}

// ===== LOCATE =====
function locateUser() {
  if (!navigator.geolocation) { showToast('위치 정보를 지원하지 않는 브라우저예요'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      map.flyTo([pos.coords.latitude, pos.coords.longitude], 15, { duration: 1 });
      L.circle([pos.coords.latitude, pos.coords.longitude], { radius: 100, color: '#e8002d', fillColor: '#e8002d', fillOpacity: 0.3 }).addTo(map);
    },
    () => showToast('위치를 가져올 수 없어요')
  );
}

function resetView() {
  map.flyTo([22.3193, 114.1694], 13, { duration: 1 });
  closeDetail();
}

// ===== REPORT =====
function openReport() {
  document.getElementById('reportOverlay').classList.add('active');
}
function closeReportIfBg(e) {
  if (e.target === document.getElementById('reportOverlay')) closeReport();
}
function closeReport() {
  document.getElementById('reportOverlay').classList.remove('active');
}
function togglePay(el) {
  el.classList.toggle('sel');
}

async function submitReport() {
  const name_zh = document.getElementById('r_name_zh').value.trim();
  const district = document.getElementById('r_district').value;
  const price_min = parseInt(document.getElementById('r_price_min').value);

  if (!name_zh) { showToast('식당명(중문)을 입력해주세요'); return; }
  if (!district) { showToast('지역을 선택해주세요'); return; }
  if (!price_min) { showToast('최저가를 입력해주세요'); return; }

  const payment = Array.from(document.querySelectorAll('.pcheck.sel')).map(el => el.dataset.val);

  const districtZhMap = {
    'Central': '中環', 'Sheung Wan': '上環', 'Wan Chai': '灣仔',
    'Causeway Bay': '銅鑼灣', 'Jordan': '佐敦', 'Tsim Sha Tsui': '尖沙咀',
    'Mong Kok': '旺角', 'Sham Shui Po': '深水埗', 'Kowloon City': '九龍城',
    'Wong Tai Sin': '黃大仙', 'Kwun Tong': '觀塘', 'Tuen Mun': '屯門',
    'Yuen Long': '元朗', 'Tai Po': '大埔', 'Sha Tin': '沙田',
    'Tseung Kwan O': '將軍澳', 'North District': '北區', 'Islands': '離島'
  };

  // 지역 좌표 (대략적)
  const districtCoords = {
    'Central': [22.2815, 114.1543], 'Sheung Wan': [22.2856, 114.1521],
    'Wan Chai': [22.2769, 114.1731], 'Causeway Bay': [22.2808, 114.1856],
    'Jordan': [22.3049, 114.1700], 'Tsim Sha Tsui': [22.2975, 114.1722],
    'Mong Kok': [22.3193, 114.1694], 'Sham Shui Po': [22.3306, 114.1624],
    'Kowloon City': [22.3282, 114.1916], 'Wong Tai Sin': [22.3425, 114.1947],
    'Kwun Tong': [22.3133, 114.2262], 'Tuen Mun': [22.3908, 113.9770],
    'Yuen Long': [22.4450, 114.0228], 'Tai Po': [22.4498, 114.1645],
    'Sha Tin': [22.3817, 114.1879], 'Tseung Kwan O': [22.3087, 114.2617],
    'North District': [22.4945, 114.1388], 'Islands': [22.2596, 113.9450]
  };

  const coords = districtCoords[district] || [22.3193, 114.1694];
  // 약간 랜덤 오프셋
  const lat = coords[0] + (Math.random() - 0.5) * 0.005;
  const lng = coords[1] + (Math.random() - 0.5) * 0.005;

  const reportData = {
    name_zh,
    name_en: document.getElementById('r_name_en').value.trim() || null,
    district_en: district,
    district_zh: districtZhMap[district] || district,
    address: document.getElementById('r_address').value.trim() || null,
    lat, lng,
    category: document.getElementById('r_category').value,
    price_min,
    price_max: parseInt(document.getElementById('r_price_max').value) || null,
    signature_dish: document.getElementById('r_dish').value.trim() || null,
    payment,
    open_hours: document.getElementById('r_hours').value.trim() || null,
  };

  if (db) {
    try {
      const { error } = await db.from('brokemap_reports').insert(reportData);
      if (error) throw error;
    } catch(e) {
      console.log('DB 저장 실패, 로컬만 처리:', e.message);
    }
  }

  showToast('제보 감사합니다! 검토 후 반영될게요 🙏');
  closeReport();
  // 폼 초기화
  ['r_name_zh','r_name_en','r_address','r_dish','r_hours','r_price_min','r_price_max'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('r_district').value = '';
  document.querySelectorAll('.pcheck.sel').forEach(el => el.classList.remove('sel'));
}

// ===== LANG =====
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`lang-${lang}`).classList.add('active');

  document.querySelectorAll('[data-zh]').forEach(el => {
    const txt = el.dataset[lang] || el.dataset.zh;
    if (txt) el.textContent = txt;
  });

  renderPlaces();
}

// ===== MOBILE PANEL =====
function toggleMobilePanel() {
  document.getElementById('sidePanel').classList.toggle('collapsed');
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
